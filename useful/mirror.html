<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>True Fullscreen Camera</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    overflow: hidden;
}

/* Container forced by JS /
#container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    background: black;
    overflow: hidden;
}

/ Video fills container without distortion /
video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(1);
}

/ Buttons /
.controls {
    position: absolute;
    bottom: 40px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 12px;
    z-index: 10;
}

button {
    padding: 14px 18px;
    font-size: 15px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.9);
}
</style>
</head>

<body>

<div id="container">
    <video id="video" autoplay playsinline muted></video>

    <div class="controls">
        <button id="normalBtn">Camera</button>
        <button id="mirrorBtn">Mirror</button>
    </div>
</div>

<script>
const container = document.getElementById('container');
const video = document.getElementById('video');
const normalBtn = document.getElementById('normalBtn');
const mirrorBtn = document.getElementById('mirrorBtn');

/ 🔑 REAL fullscreen fix /
function setFullHeight() {
    const h = window.innerHeight;
    container.style.height = h + 'px';
}
setFullHeight();

window.addEventListener('resize', setFullHeight);
window.addEventListener('orientationchange', setFullHeight);

/ 🎥 Start camera /
async function startCamera(mirror) {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" },
            audio: false
        });

        video.srcObject = stream;
        video.style.transform = mirror ? "scaleX(-1)" : "scaleX(1)";

        / 🔒 Try to lock orientation */
        if (screen.orientation && screen.orientation.lock) {
            try {
                await screen.orientation.lock("portrait");
            } catch (e) {
                console.log("Orientation lock not supported here");
            }
        }

        normalBtn.style.display = "none";
        mirrorBtn.style.display = "none";

    } catch (err) {
        alert("Camera error: " + err.message);
    }
}

normalBtn.onclick = () => startCamera(false);
mirrorBtn.onclick = () => startCamera(true);
</script>

</body>
</html>
