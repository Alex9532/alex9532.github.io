<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fullscreen Camera iOS</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    overflow: hidden;
}

/* Force true full screen /
#container {
    position: fixed;
    width: 100vw;
    height: 100dvh; / KEY FIX /
    top: 0;
    left: 0;
    background: black;
}

/ Video fills everything /
video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(1);
}

/ Controls */
.controls {
    position: absolute;
    bottom: 40px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 15px;
    z-index: 10;
}

button {
    padding: 14px 18px;
    font-size: 15px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.9);
}
</style>
</head>

<body>

<div id="container">
    <video id="video" autoplay playsinline muted></video>

    <div class="controls">
        <button id="normalBtn">Start Camera</button>
        <button id="mirrorBtn">Start Mirror</button>
    </div>
</div>

<script>
const video = document.getElementById('video');
const normalBtn = document.getElementById('normalBtn');
const mirrorBtn = document.getElementById('mirrorBtn');

async function startCamera(mirror) {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "user"
            },
            audio: false
        });

        video.srcObject = stream;

        // Mirror toggle
        video.style.transform = mirror ? "scaleX(-1)" : "scaleX(1)";

        normalBtn.style.display = "none";
        mirrorBtn.style.display = "none";

    } catch (e) {
        alert("Camera failed: " + e.message);
    }
}

normalBtn.onclick = () => startCamera(false);
mirrorBtn.onclick = () => startCamera(true);
</script>

</body>
</html>
