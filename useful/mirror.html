<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>iOS Fullscreen Camera</title>

<style>
    :root {
        --vh: 1vh;
    }

    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        height: -webkit-fill-available;
        background: black;
        overflow: hidden;
        overscroll-behavior: none;
    }

    body {
        position: fixed;
        inset: 0;
    }

    #container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: calc(var(--vh, 1vh) * 100);
        background: black;
        overflow: hidden;
    }

    video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
        background: black;
        transform: scaleX(1);
        -webkit-transform: scaleX(1);
    }

    .controls {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 24px;
        display: flex;
        justify-content: center;
        gap: 12px;
        z-index: 10;
        padding: 0 16px;
        box-sizing: border-box;
        pointer-events: auto;
    }

    button {
        padding: 14px 18px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        background: rgba(255,255,255,0.92);
        color: black;
        -webkit-appearance: none;
        appearance: none;
    }

    #info {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-size: 12px;
        z-index: 20;
        opacity: 0.8;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    }
</style>
</head>

<body>
<div id="container">
    <video id="video" autoplay playsinline muted></video>

    <div id="info"></div>

    <div class="controls">
        <button id="normalBtn">Start Camera</button>
        <button id="mirrorBtn">Start Mirror</button>
    </div>
</div>

<script>
const container = document.getElementById('container');
const video = document.getElementById('video');
const normalBtn = document.getElementById('normalBtn');
const mirrorBtn = document.getElementById('mirrorBtn');
const info = document.getElementById('info');

function syncViewportHeight() {
    const height = window.visualViewport ? window.visualViewport.height : window.innerHeight;

    document.documentElement.style.setProperty('--vh', `${height * 0.01}px`);
    document.documentElement.style.height = `${height}px`;
    document.body.style.height = `${height}px`;
    container.style.height = `${height}px`;
}

function updateInfo() {
    info.textContent = `Screen: ${window.innerWidth} × ${window.innerHeight}`;
}

syncViewportHeight();
updateInfo();

window.addEventListener('resize', () => {
    syncViewportHeight();
    updateInfo();
});

window.addEventListener('orientationchange', () => {
    setTimeout(() => {
        syncViewportHeight();
        updateInfo();
    }, 100);
});

if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
        syncViewportHeight();
        updateInfo();
    });
}

async function tryLockOrientation() {
    if (screen.orientation && screen.orientation.lock) {
        try {
            await screen.orientation.lock('portrait');
        } catch (e) {
            // iOS may ignore this even in standalone mode
        }
    }
}

async function startCamera(mirror) {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "user",
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            },
            audio: false
        });

        video.srcObject = stream;
        video.style.transform = mirror ? "scaleX(-1)" : "scaleX(1)";
        video.style.webkitTransform = mirror ? "scaleX(-1)" : "scaleX(1)";

        await tryLockOrientation();

        normalBtn.style.display = 'none';
        mirrorBtn.style.display = 'none';
    } catch (err) {
        alert("Camera access failed: " + err.message);
        console.error(err);
    }
}

normalBtn.addEventListener('click', () => startCamera(false));
mirrorBtn.addEventListener('click', () => startCamera(true));
</script>
</body>
</html>
