<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iOS Fullscreen Camera</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}

#container {
    position: fixed;
    inset: 0;
}

/* Camera video /
video {
    width: 100%;
    height: 100%;
    object-fit: cover; / no stretching /
    background: black;
    transform: scaleX(1); / default normal /
}

/ Buttons */
.controls {
    position: absolute;
    bottom: 30px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 15px;
    z-index: 10;
}

button {
    padding: 14px 18px;
    font-size: 15px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.9);
    color: black;
}
</style>
</head>

<body>

<div id="container">
    <video id="video" autoplay playsinline muted></video>

    <div class="controls">
        <button id="normalBtn">Start Camera</button>
        <button id="mirrorBtn">Start Mirror</button>
    </div>
</div>

<script>
const video = document.getElementById('video');
const normalBtn = document.getElementById('normalBtn');
const mirrorBtn = document.getElementById('mirrorBtn');

async function startCamera(mirrored) {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "user"
            },
            audio: false
        });

        video.srcObject = stream;

        // Apply mirror or normal
        video.style.transform = mirrored ? "scaleX(-1)" : "scaleX(1)";

        // Hide buttons after starting
        normalBtn.style.display = "none";
        mirrorBtn.style.display = "none";

    } catch (err) {
        alert("Camera error: " + err.message);
        console.error(err);
    }
}

normalBtn.addEventListener("click", () => startCamera(false));
mirrorBtn.addEventListener("click", () => startCamera(true));
</script>

</body>
</html>
